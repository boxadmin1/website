<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Links | Evan</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .navbar a[href="links.html"] { background: rgba(161, 123, 224, 0.25); color: #d1bcf2; }
    #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    
    .links-container { position: relative; z-index: 10; max-width: 450px; margin: 0 auto; text-align: center; }
    .link-btn { display: block; padding: 18px; margin-bottom: 20px; border-radius: 16px; background: rgba(161, 123, 224, 0.1); border: 1px solid rgba(161, 123, 224, 0.2); color: #fff; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: 0.3s ease; animation: fadeInUp 0.8s ease both; }
    .link-btn:hover { background: rgba(161, 123, 224, 0.3); border-color: #a17be0; transform: translate3d(0, -5px, 0); box-shadow: 0 10px 20px rgba(161, 123, 224, 0.2); }
    
    /* Staggered animation for links */
    .link-btn:nth-child(1) { animation-delay: 0.2s; }
    .link-btn:nth-child(2) { animation-delay: 0.3s; }
    .link-btn:nth-child(3) { animation-delay: 0.4s; }
    .link-btn:nth-child(4) { animation-delay: 0.5s; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <nav class="navbar">
    <a href="home.html">Home</a>
    <a href="links.html">Links</a>
    <a href="about.html">About Me</a>
    <a href="other.html">Other</a>
  </nav>
  
  <main class="links-container">
    <h1 class="page-title">My Links</h1>
    <div class="links-wrapper">
      <a href="https://boxadmin1.github.io/website/" class="link-btn">Website</a>
      <a href="https://discord.com/users/boxadmin1" class="link-btn">Discord</a>
      <a href="https://x.com/Nave559692" class="link-btn">Twitter</a>
      <a href="https://github.com/boxadmin1" class="link-btn">GitHub</a>
    </div>
  </main>
  
  <footer>JESUS CHRIST LOVES YOU!</footer>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let width, height;
    const particles = [];
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    class Particle {
      constructor() { this.reset(); }
      reset() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2; this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25; this.alpha = Math.random() * 0.5; }
      update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset(); }
      draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${this.alpha})`; ctx.fill(); }
    }
    function init() { resize(); for (let i = 0; i < 70; i++) particles.push(new Particle()); animate(); }
    function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    window.addEventListener('resize', resize);
    init();
  </script>
</body>
</html>
