<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home | Evan</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .navbar a[href="home.html"] { background: rgba(161, 123, 224, 0.25); color: #d1bcf2; }
    .hero { text-align: center; margin-bottom: 30px; animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .hero-title { font-size: clamp(2.5rem, 10vw, 4.5rem); font-weight: 700; background: linear-gradient(to bottom, #ffffff, #d1bcf2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glowPulse 3s ease-in-out infinite; display: inline-block; padding: 5px; }
    .username { font-size: 1.1rem; color: rgba(161, 123, 224, 0.8); font-weight: 600; text-transform: uppercase; margin-top: -5px; animation: fadeInUp 0.8s ease both 0.4s; }
    .featured-card { border: 1px solid rgba(161, 123, 224, 0.3); animation: fadeInUp 0.8s ease both 0.5s; }
    .badge { display: inline-block; background: #a17be0; color: #fff; padding: 6px 16px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; box-shadow: 0 0 15px rgba(161, 123, 224, 0.5); }
    .interests-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .interest-item { background: rgba(255, 255, 255, 0.04); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; animation: fadeInUp 0.5s ease both; }
    .interest-item:hover { background: rgba(161, 123, 224, 0.2); border-color: rgba(161, 123, 224, 0.6); transform: translate3d(0, -5px, 0) scale(1.05); }
    .section-header { animation: fadeInUp 0.8s ease both; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
  </style>
</head>
<body>
<nav class="navbar"><a href="home.html">Home</a><a href="links.html">Links</a><a href="about.html">About Me</a><a href="other.html">Other</a></nav>
<main>
  <div class="hero">
    <div class="hero-title">Hi, I'm Evan</div>
    <div class="username">aka boxamdin 1</div>
  </div>
  <div class="float-wrapper">
    <div class="bubble-card" style="text-align: center; animation: fadeInUp 0.8s ease both 0.2s;">
      <p style="font-size: 1.15rem; line-height: 1.7; color: #c9c4d7;">Welcome to my portfolio! I specialize in <strong>Electrical Engineering</strong> and <strong>Programming</strong>.</p>
    </div>
  </div>
  <div class="card featured-card">
    <span class="badge">Most Proud Achievement</span>
    <h3 style="font-size: 2.2rem; margin-bottom: 15px;">Robotic Quadruped</h3>
    <p>A custom-designed, large-scale robotic quadruped built from the ground up.</p>
  </div>
</main>
<footer>JESUS CHRIST LOVES YOU!</footer>
</body>
</html>
